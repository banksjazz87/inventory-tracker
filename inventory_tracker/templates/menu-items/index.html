{% extends 'base.html' %}

{% block head %}
    <title>Menu Items</title>
{% endblock %}

{% block body %}
    <h2>Menu Items will be listed here</h2>
     <table>
        <thead>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
        </thead>
        {% for item in items %}
            <tr>
                <td>{{ item.pk }}</td>
                <td>{{ item.name }}</td>
                <td>${{ item.price}}</td>
                <td>View Ingredients</td>
                {% comment %} <td><a href="{% url 'ingredient-edit' pk=ingredient.pk %}">Edit</a></td>
                <td><a href="{% url 'ingredient-delete' pk=ingredient.pk %}">Delete</a></td> {% endcomment %}
                 <td><a href="{% url 'menu-item-ingredient-list' pk=item.pk%}">Recipe</a></td>
            </tr>
        {% endfor %}
    </table>
{% endblock %}
